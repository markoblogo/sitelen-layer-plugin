name: python static publish

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Publish target"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi
      dry_run:
        description: "Build and verify only; skip upload"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python/sitelen-layer-static
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine pytest hatchling

      - name: Install package
        run: python -m pip install -e .

      - name: Run tests
        run: pytest tests

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Publish to TestPyPI
        if: ${{ !inputs.dry_run && inputs.repository == 'testpypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/sitelen-layer-static/dist/
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run && inputs.repository == 'pypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/sitelen-layer-static/dist/
