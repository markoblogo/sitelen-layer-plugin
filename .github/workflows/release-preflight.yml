name: v0.3 publish-preflight

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  publish-preflight:
    name: Build + package + smoke artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:run

      - name: Build adapter packages
        run: npm run pack:adapters

      - name: Verify adapter package artifacts
        run: npm run smoke:adapters

      - name: Verify npm tarball
        run: npm run smoke:publication

      - name: Upload adapter artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sitelen-layer-adapter-packages
          path: |
            dist/adapters/*.zip
            *.tgz
