name: v0.3 publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (required for manual dispatch). Example: v0.3.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Publish npm package and release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: release_tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag format
        run: |
          if ! [[ "${{ steps.release_tag.outputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: ${{ steps.release_tag.outputs.tag }}"
            echo "Expected format: v<major>.<minor>.<patch>"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test:run

      - name: Build adapter packages
        run: npm run pack:adapters

      - name: Verify adapter package artifacts
        run: npm run smoke:adapters

      - name: Prepare npm tarball
        run: npm run smoke:publication

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Find npm tarball
        id: tgz
        run: |
          tarball_file="$(ls -1 *.tgz | head -n 1)"
          if [[ -z "$tarball_file" ]]; then
            echo "npm tarball was not found"
            exit 1
          fi
          echo "file=$tarball_file" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Release ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.tgz.outputs.file }}
            dist/adapters/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
